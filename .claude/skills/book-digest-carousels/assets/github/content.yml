# Copy to .github/workflows/content.yml
# Runs twice a day (00:00 and 18:00 West Africa Time / GMT+1). On each run it checks
# the completion gate: only if you've ticked every item in the "Current batch"
# checklist in TRACKER.md does it produce and send the NEXT batch. Otherwise it waits.
#
# A batch = the next unit for each of the four tracks (DDIA, AI Engineering,
# High Performance MySQL, AWS). It publishes the HTML digests to GitHub Pages and
# emails you the link plus that batch's carousels as a zip.
name: Content

on:
  schedule:
    - cron: "0 23 * * *"   # 00:00 WAT (GMT+1)  = 23:00 UTC
    - cron: "0 17 * * *"   # 18:00 WAT (GMT+1)  = 17:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: content
  cancel-in-progress: false

jobs:
  content:
    runs-on: ubuntu-latest
    env:
      SKILL: .claude/skills/book-digest-carousels
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      # ---- gate: have you finished the current batch? ----
      - name: Completion gate
        id: gate
        run: python "$SKILL"/scripts/gate.py --tracker TRACKER.md

      - name: System deps
        if: steps.gate.outputs.send == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone libcairo2 libpango-1.0-0 fontconfig zip
          pip install --quiet cairosvg pillow pypdf pyyaml anthropic

      - name: Install bundled fonts
        if: steps.gate.outputs.send == 'true'
        run: mkdir -p ~/.fonts && cp "$SKILL"/assets/fonts/*.ttf ~/.fonts/ && fc-cache -f

      - name: Configure Google Drive (rclone, read-only)
        if: steps.gate.outputs.send == 'true'
        run: |
          echo "$GDRIVE_SA_JSON" > /tmp/sa.json
          mkdir -p ~/.config/rclone
          printf '[gdrive]\ntype = drive\nscope = drive.readonly\nservice_account_file = /tmp/sa.json\nroot_folder_id = %s\n' "${{ vars.GDRIVE_BOOKS_FOLDER_ID }}" > ~/.config/rclone/rclone.conf
        env:
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}

      - name: Pull the books folder
        if: steps.gate.outputs.send == 'true'
        run: |
          rclone copy gdrive: ./books --fast-list

      - name: Install Claude Code
        if: steps.gate.outputs.send == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Produce the next batch (4 tracks)
        if: steps.gate.outputs.send == 'true'
        env:
          # Uses the Max/Pro subscription via a long-lived OAuth token (claude setup-token),
          # NOT pay-as-you-go API credits. If ANTHROPIC_API_KEY is also set it takes
          # precedence, so we intentionally do not set it here.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: |
          claude -p "Use the book-digest-carousels skill. Read TRACKER.md, then follow its Content \
          guardrails exactly. Produce the NEXT unit for each of the four tracks (DDIA, AI Engineering, \
          High Performance MySQL, AWS), finishing an in-progress chapter before starting a new one. \
          Treat each book as its OWN independent job, carried through all six stages in order: (1) Source \
          - pin the exact chapter/AWS docs section and record citations; (2) Teaching - beginner-friendly \
          explanation, examples, caveats, recall questions; (3) Visual - original schematics from first \
          principles; (4) Build - a small runnable micro-project with clear completion criteria; \
          (5) Verification - check every factual claim, command, citation, and link against the source, \
          fix or flag anything that fails; (6) Delivery. Do NOT bundle the books' research together. \
          Ground all claims in the source, invent nothing (no fake commands, APIs, numbers, pricing, or \
          limits), label any beginner simplification with its caveat, keep all wording and diagrams \
          original, and END EACH DIGEST WITH A 'Sources & verify' SECTION (book, chapter, pages; AWS doc \
          links). For each unit: write a THOROUGH, beginner-complete HTML digest to docs/digests/<slug>.html \
          following references/digest-template.md exactly (a full 'How it works' that opens with a grounding \
          section, one labelled sub-section per concept with inline-SVG schematics, every term defined, and a \
          4-6 item 'Try it yourself'); do NOT thin it out or shorten it - err long. Append \
          docs/digests.json, and render its carousel PNGs to build/carousels/<book>/<slug>/ (keep that \
          unit's deck.json in the same folder, the lint step reads it) where <book> \
          is a clean folder name (DDIA, AI-Engineering, High-Performance-MySQL, AWS) so the zip is \
          foldered per book. Do NOT write the email yourself; a later step builds a Gmail-safe one \
          from docs/digests.json. Update the per-book tables in TRACKER.md, and \
          REPLACE the 'Current batch' checklist with the new unit list, all unchecked." \
            --permission-mode acceptEdits --allowedTools "Bash,Read,Write,Edit,Glob,Grep,WebFetch"

      # Checks the generated decks against the content guardrails (book tells, structure,
      # fixed chrome, unbounded absolutes). continue-on-error so a finding is loud in the
      # run log and annotations but never costs an already-generated batch.
      - name: Lint the carousels
        if: steps.gate.outputs.send == 'true'
        continue-on-error: true
        run: python "$SKILL"/scripts/lint_carousels.py --carousels build/carousels

      - name: Rebuild index, build email, zip the carousels
        if: steps.gate.outputs.send == 'true'
        env:
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: |
          python "$SKILL"/scripts/build_index.py --docs docs
          python "$SKILL"/scripts/build_email.py --docs docs --site-base-url "$SITE_BASE_URL" \
            --logo "$SKILL"/assets/brand/logo.png --out build/email.html
          mkdir -p build
          (cd build/carousels && zip -r "../carousels-$(date -u +%F).zip" .)

      - name: Email the link + carousels zip
        if: steps.gate.outputs.send == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: python "$SKILL"/scripts/deliver_digest.py --file build/email.html --attach "build/carousels-*.zip"

      - name: Publish + commit
        if: steps.gate.outputs.send == 'true'
        run: |
          git config user.name "content-bot"
          git config user.email "content-bot@users.noreply.github.com"
          git add docs/ TRACKER.md || true
          git commit -m "Batch $(date -u +%F)" || { echo "nothing to commit"; exit 0; }
          # Rebase onto any concurrent pushes, then push. Retry so a race never drops a
          # batch (a plain 'git push || true' would silently lose the just-built content).
          for attempt in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push attempt $attempt rejected; retrying"; sleep 5
          done
          echo "::error::could not push batch after 5 attempts"; exit 1
