<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<defs>
<radialGradient id="bg" cx="50%" cy="0%" r="120%">
<stop offset="0" stop-color="#131316"/><stop offset="0.55" stop-color="#0A0A0B"/><stop offset="1" stop-color="#070708"/>
</radialGradient>
<pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
<path d="M60 0H0V60" fill="none" stroke="rgba(242,239,233,0.035)" stroke-width="1"/>
</pattern>
<clipPath id="avclip"><circle cx="0" cy="0" r="1"/></clipPath>
</defs>
<rect width="1080" height="1350" rx="6" fill="url(#bg)"/>
<rect width="1080" height="1350" rx="6" fill="url(#grid)"/>
<path d="M48 48 h56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M48 48 v56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M1032 48 h-56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M1032 48 v56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M48 1302 h56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M48 1302 v-56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M1032 1302 h-56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<path d="M1032 1302 v-56" stroke="rgba(242,239,233,0.10)" stroke-width="1.5"/>
<text data-field="terminal" x="80" y="132" data-box-w="640" data-max-lines="1"
  data-size="30" data-min-size="24" data-align="left" font-family="JetBrains Mono" font-weight="500"
  fill="#F2EFE9">{{terminal}}</text>
<text data-field="counter" x="1000" y="132" data-box-w="260" data-max-lines="1"
  data-size="30" data-min-size="24" data-align="right" font-family="JetBrains Mono" font-weight="400"
  fill="#7A7A80">{{counter}}</text>
<text data-field="kicker" x="80" y="250" data-box-w="900" data-max-lines="1"
  data-size="30" data-min-size="24" data-align="left" font-family="JetBrains Mono" font-weight="500"
  fill="#C8453A" letter-spacing="4">{{kicker}}</text>
<text data-field="heading" x="80" y="360" data-box-w="920" data-box-h="150" data-max-lines="2"
  data-size="56" data-min-size="38" data-line-height="1.06" data-align="left"
  font-family="Bricolage Grotesque" font-weight="700" fill="#F2EFE9">{{heading}}</text>
<rect x="80" y="470" width="920" height="600" rx="16" fill="#0E0E10" stroke="rgba(242,239,233,0.12)" stroke-width="1.5"/>
<circle cx="120" cy="508" r="7" fill="#C8453A"/><circle cx="148" cy="508" r="7" fill="#7A7A80"/><circle cx="176" cy="508" r="7" fill="#3A3A3E"/>
<text data-field="filename" x="210" y="518" data-box-w="700" data-max-lines="1"
  data-size="26" data-min-size="22" data-align="left" font-family="JetBrains Mono" font-weight="400"
  fill="#7A7A80">{{filename}}</text>
<text data-field="code" x="118" y="590" data-box-w="850" data-box-h="440" data-max-lines="13" data-pre="true"
  data-size="34" data-min-size="22" data-line-height="1.5" data-align="left"
  font-family="JetBrains Mono" font-weight="400" fill="#E7E4DC">{{code}}</text>
<text data-field="caption" x="80" y="1140" data-box-w="900" data-box-h="90" data-max-lines="2"
  data-size="34" data-min-size="28" data-line-height="1.3" data-align="left"
  font-family="Inter" font-weight="400" fill="#D8D5CD">{{caption}}</text>
<text data-field="handle" x="80" y="1278" data-box-w="560" data-max-lines="1"
  data-size="30" data-min-size="24" data-align="left" font-family="JetBrains Mono" font-weight="500"
  fill="#7A7A80" letter-spacing="1">{{handle}}</text>
<text data-field="tags" x="1000" y="1278" data-box-w="420" data-max-lines="1"
  data-size="28" data-min-size="22" data-align="right" font-family="JetBrains Mono" font-weight="400"
  fill="#7A7A80" letter-spacing="1">{{tags}}</text>
</svg>